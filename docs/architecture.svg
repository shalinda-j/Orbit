<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 600" width="1060" height="600" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, Menlo, monospace">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6b7280"/></marker>
    <marker id="arwC" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#67E8F9"/></marker>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C3AED"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
  </defs>

  <rect x="4" y="4" width="1052" height="592" rx="14" fill="#0c0c0e" stroke="#26262b"/>

  <!-- shared state -->
  <rect x="290" y="34" width="600" height="96" rx="10" fill="#0f1417" stroke="#67E8F9" stroke-opacity="0.6"/>
  <text x="590" y="60" text-anchor="middle" font-size="15" fill="#67E8F9" font-weight="700">./.orbit — shared state</text>
  <text x="590" y="86"  text-anchor="middle" font-size="13.5" fill="#d1d5db">store.json · tasks · messages · roster · findings · debates</text>
  <text x="590" y="108" text-anchor="middle" font-size="13.5" fill="#8a8a93">brain/*.md · persistent knowledge</text>

  <!-- your goal -->
  <text x="60" y="80" font-size="15" fill="#f3f4f6" font-weight="700">your goal</text>
  <line x1="90" y1="92" x2="90" y2="196" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- genesis -->
  <rect x="30" y="200" width="170" height="96" rx="10" fill="#16121f" stroke="url(#pg)" stroke-width="1.6"/>
  <text x="115" y="240" text-anchor="middle" font-size="15" fill="#c4b5fd" font-weight="700">Genesis</text>
  <text x="115" y="266" text-anchor="middle" font-size="13" fill="#9a8fb8">designs a team</text>

  <!-- genesis -> planner -->
  <line x1="200" y1="248" x2="256" y2="248" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- agent cards -->
  <g>
    <rect x="262" y="200" width="150" height="96" rx="10" fill="#141824" stroke="#818CF8" stroke-width="1.6"/>
    <text x="337" y="240" text-anchor="middle" font-size="15" fill="#a5b4fc" font-weight="700">Planner</text>
    <text x="337" y="266" text-anchor="middle" font-size="12.5" fill="#7c85b8">Gemini</text>

    <rect x="432" y="200" width="150" height="96" rx="10" fill="#101d18" stroke="#34D399" stroke-width="1.6"/>
    <text x="507" y="240" text-anchor="middle" font-size="15" fill="#6ee7b7" font-weight="700">Coder</text>
    <text x="507" y="266" text-anchor="middle" font-size="12.5" fill="#4f8f76">DeepSeek</text>

    <text x="612" y="253" text-anchor="middle" font-size="18" fill="#6b7280">···</text>

    <rect x="640" y="200" width="150" height="96" rx="10" fill="#1e1420" stroke="#F472B6" stroke-width="1.6"/>
    <text x="715" y="240" text-anchor="middle" font-size="15" fill="#f9a8d4" font-weight="700">Reviewer</text>
    <text x="715" y="266" text-anchor="middle" font-size="12.5" fill="#a86e8a">Kimi</text>
  </g>

  <!-- agents <-> shared state (read/write) -->
  <line x1="337" y1="200" x2="337" y2="134" stroke="#3f3f46" stroke-width="1.4" marker-end="url(#arw)"/>
  <line x1="507" y1="200" x2="507" y2="134" stroke="#3f3f46" stroke-width="1.4" marker-end="url(#arw)"/>
  <line x1="715" y1="200" x2="715" y2="134" stroke="#3f3f46" stroke-width="1.4" marker-end="url(#arw)"/>

  <text x="830" y="252" font-size="13" fill="#8a8a93">← each on its own</text>
  <text x="830" y="270" font-size="13" fill="#8a8a93">   provider / model</text>

  <!-- coordinator bracket -->
  <path d="M337,300 L337,326 L715,326 L715,300" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <text x="526" y="348" text-anchor="middle" font-size="13.5" fill="#a78bfa">Coordinator routes turns</text>

  <!-- to synthesizer -->
  <path d="M340,326 C200,360 150,380 130,414" fill="none" stroke="#67E8F9" stroke-width="1.6" marker-end="url(#arwC)"/>
  <text x="540" y="392" text-anchor="middle" font-size="13" fill="#8a8a93">agents see each other's work · use tools · until </text>
  <text x="905" y="392" font-size="13" fill="#34D399" font-weight="700">[FINISHED]</text>

  <!-- synthesizer -->
  <rect x="40" y="420" width="190" height="60" rx="10" fill="#0f1417" stroke="#67E8F9" stroke-width="1.6"/>
  <text x="135" y="456" text-anchor="middle" font-size="15" fill="#67E8F9" font-weight="700">Synthesizer</text>

  <line x1="135" y1="480" x2="135" y2="520" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>
  <text x="60" y="548" font-size="15" fill="#f3f4f6" font-weight="700">final product</text>
</svg>
