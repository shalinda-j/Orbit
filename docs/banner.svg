<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, Menlo, monospace">
  <defs>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7C3AED"/>
      <stop offset="38%" stop-color="#A78BFA"/>
      <stop offset="72%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="984" height="464" rx="14" fill="url(#bg)" stroke="#26262b" stroke-width="1.5"/>
  <!-- title bar -->
  <circle cx="38" cy="38" r="6.5" fill="#ff5f57"/>
  <circle cx="60" cy="38" r="6.5" fill="#febc2e"/>
  <circle cx="82" cy="38" r="6.5" fill="#28c840"/>
  <text x="500" y="43" text-anchor="middle" font-size="14" fill="#5b5b63">Windows PowerShell</text>
  <line x1="8" y1="62" x2="992" y2="62" stroke="#1e1e22" stroke-width="1.5"/>

  <!-- wordmark -->
  <text x="500" y="205" text-anchor="middle" font-size="132" font-weight="800" letter-spacing="10" fill="url(#orbit)">ORBIT</text>

  <!-- taglines -->
  <text x="500" y="252" text-anchor="middle" font-size="17" fill="#8a8a93">Multi-Agent Team · Multi-Provider · v1.1.0</text>
  <text x="500" y="278" text-anchor="middle" font-size="14" fill="#4b4b52">Different models on different agents, working as one team.</text>

  <!-- status block -->
  <g font-size="15.5">
    <text x="120" y="330" fill="#6b7280">Providers</text>
    <text x="205" y="330" fill="#34D399">●</text>
    <text x="222" y="330" fill="#d1d5db">claude-code</text>
    <text x="330" y="330" fill="#4b5563">·</text>
    <text x="348" y="330" fill="#34D399">●</text>
    <text x="365" y="330" fill="#d1d5db">ollama</text>
    <text x="440" y="330" fill="#4b5563">·  +14 available →</text>
    <text x="612" y="330" fill="#67E8F9">/connect</text>

    <text x="120" y="358" fill="#6b7280">Mode</text>
    <text x="172" y="358" fill="#34D399" font-weight="700">build</text>
    <text x="228" y="358" fill="#4b5563">·</text>
    <text x="246" y="358" fill="#6b7280">Perms</text>
    <text x="304" y="358" fill="#d1d5db">safe</text>
    <text x="350" y="358" fill="#4b5563">·</text>
    <text x="368" y="358" fill="#6b7280">Style</text>
    <text x="422" y="358" fill="#d1d5db">collaborative</text>
    <text x="548" y="358" fill="#4b5563">·</text>
    <text x="566" y="358" fill="#6b7280">Turns</text>
    <text x="620" y="358" fill="#d1d5db">6</text>

    <text x="120" y="386" fill="#6b7280">Team</text>
    <text x="172" y="386" fill="#f3f4f6">Dynamic (generated per task)</text>
  </g>

  <!-- prompt -->
  <text x="120" y="432" font-size="16"><tspan fill="#34D399" font-weight="700">build</tspan><tspan fill="#6b7280"> › </tspan><tspan fill="#f3f4f6">Fix the failing test in src/auth.js</tspan></text>
  <rect x="537" y="420" width="9" height="17" fill="#a78bfa"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></rect>
</svg>
