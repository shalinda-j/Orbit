<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" width="1040" height="560" font-family="ui-sans-serif, system-ui, 'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="l1" cx="62%" cy="50%" r="75%"><stop offset="0" stop-color="#312e81"/><stop offset="1" stop-color="#1e1b4b"/></radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C3AED"/><stop offset="55%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#67E8F9"/></linearGradient>
  </defs>

  <rect x="4" y="4" width="1032" height="552" rx="16" fill="#0c0c0e" stroke="#26262b"/>

  <rect x="44" y="40" width="8" height="40" rx="2" fill="#67E8F9"/>
  <text x="66" y="72" font-size="30" font-weight="800" fill="url(#ink)">The 4 Layers of AI Engineering</text>
  <text x="66" y="98" font-size="15" fill="#8a8a93">…and how Orbit implements every one.</text>

  <!-- nested ellipses -->
  <g transform="translate(0,20)">
    <ellipse cx="470" cy="290" rx="420" ry="170" fill="#1e1b4b" fill-opacity="0.55" stroke="#4338ca" stroke-opacity="0.6"/>
    <ellipse cx="540" cy="290" rx="330" ry="150" fill="#3730a3" fill-opacity="0.45" stroke="#6366f1" stroke-opacity="0.5"/>
    <ellipse cx="610" cy="290" rx="235" ry="128" fill="#4f46e5" fill-opacity="0.45" stroke="#818cf8" stroke-opacity="0.6"/>
    <ellipse cx="695" cy="290" rx="140" ry="104" fill="url(#l1)" stroke="#a78bfa" stroke-opacity="0.8"/>
    <circle  cx="748" cy="290" r="82" fill="#4f46e5" fill-opacity="0.85" stroke="#c4b5fd"/>

    <text x="150" y="296" text-anchor="middle" font-size="21" font-weight="700" fill="#c7d2fe">Loop</text>
    <text x="360" y="296" text-anchor="middle" font-size="21" font-weight="700" fill="#dbeafe">Harness</text>
    <text x="565" y="296" text-anchor="middle" font-size="21" font-weight="700" fill="#eef2ff">Context</text>
    <text x="748" y="297" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">Prompt</text>
  </g>

  <text x="520" y="540" text-anchor="middle" font-size="13" fill="#5b5b63">Each outer layer wraps the ones inside it — Orbit is engineered at all four.</text>
</svg>
